<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mundfall — the Mund awaits." />
    <meta name="theme-color" content="#030308" />
    <title>Mundfall</title>
    <meta property="og:title" content="Mundfall" />
    <meta property="og:description" content="The Mund awaits." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Cinzel:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='12' fill='%23b9b4a6'/%3E%3Ccircle cx='21' cy='13' r='10' fill='%23030308'/%3E%3C/svg%3E"
    />
  </head>
  <body class="h-full overflow-hidden bg-void text-bone antialiased">
    <!-- Three.js scene: moon, deep starfield, parallax -->
    <canvas id="scene" class="fixed inset-0 h-full w-full" aria-hidden="true"></canvas>
    <!-- 2D bombardment overlay: shells, dust, smoke, soot, reticle -->
    <canvas id="battle" class="pointer-events-none fixed inset-0 h-full w-full" aria-hidden="true"></canvas>
    <!-- Film grain + cinematic vignette -->
    <div class="grain pointer-events-none fixed inset-0" aria-hidden="true"></div>
    <div class="vignette pointer-events-none fixed inset-0" aria-hidden="true"></div>

    <main class="pointer-events-none relative z-10 flex h-full flex-col items-center justify-end px-8 pb-10 text-center">
      <h1 class="reveal wordmark font-fraktur" style="--delay: 0.6s">Mundfall</h1>
      <p class="reveal tagline font-rite" style="--delay: 1.4s">The Mund Awaits</p>

      <footer class="reveal mt-16 flex w-full max-w-3xl items-center justify-center gap-7" style="--delay: 2.2s">
        <!-- TODO: replace with the real Steam store page once it exists -->
        <a href="https://store.steampowered.com/" target="_blank" rel="noopener noreferrer" class="link pointer-events-auto font-rite">Steam</a>
        <span class="dot" aria-hidden="true"></span>
        <!-- TODO: replace with the real X / Twitter profile once it exists -->
        <a href="https://twitter.com/mundfall" target="_blank" rel="noopener noreferrer" class="link pointer-events-auto font-rite">X</a>
        <span class="dot" aria-hidden="true"></span>
        <button id="sound-toggle" type="button" aria-pressed="true" class="link pointer-events-auto font-rite">Sound</button>
      </footer>
    </main>

    <!-- Rally banner — drops in above the moon on every strike -->
    <div id="rally" class="rally pointer-events-none fixed inset-x-0 top-0 z-20 flex justify-center" aria-hidden="true">
      <div class="rally-banner font-rite">
        <span>The Mund Needs</span>
        <span class="rally-you font-fraktur">You</span>
        <span>Soldaten!</span>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
