<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mundfall — the Mund awaits. A dark rite beneath a dying moon." />
    <meta name="theme-color" content="#06060a" />
    <title>Mundfall — The Mund Awaits</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='12' fill='%23e6e1d3'/%3E%3Ccircle cx='20' cy='14' r='10' fill='%2306060a'/%3E%3C/svg%3E"
    />
  </head>
  <body class="h-full overflow-hidden bg-void text-bone antialiased">
    <!-- Three.js scene: moon, starfield, parallax -->
    <canvas id="scene" class="fixed inset-0 h-full w-full" aria-hidden="true"></canvas>
    <!-- 2D overlay: cursor ash trail -->
    <canvas id="ash" class="pointer-events-none fixed inset-0 h-full w-full" aria-hidden="true"></canvas>
    <!-- Vignette -->
    <div class="vignette pointer-events-none fixed inset-0" aria-hidden="true"></div>

    <main class="pointer-events-none relative z-10 flex h-full flex-col items-center justify-between px-6 py-10 text-center">
      <header class="reveal" style="--delay: 0.2s">
        <p class="font-rite text-[0.65rem] uppercase tracking-rite text-ash sm:text-xs">
          Ein Spiel in Dunkelheit
        </p>
      </header>

      <section class="mt-auto">
        <h1
          id="title"
          class="reveal font-fraktur text-6xl leading-none text-bone title-glow sm:text-8xl"
          style="--delay: 0.8s"
        >
          The Mund Awaits
        </h1>
        <p
          id="tagline"
          class="reveal mt-6 font-rite text-[0.7rem] uppercase tracking-rite text-ash sm:text-sm"
          style="--delay: 1.6s"
        >
          When the moon falls, the rite begins
        </p>
        <p class="reveal mt-10 font-rite text-[0.6rem] uppercase tracking-rite text-blood sm:text-xs" style="--delay: 2.4s">
          Mundfall &mdash; MMXXVI
        </p>
      </section>

      <footer class="reveal mt-auto flex w-full items-end justify-between" style="--delay: 3s">
        <nav class="pointer-events-auto flex items-center gap-8" aria-label="Social links">
          <!-- TODO: replace with the real X / Twitter profile once it exists -->
          <a
            href="https://twitter.com/mundfall"
            target="_blank"
            rel="noopener noreferrer"
            class="social-link font-rite text-[0.65rem] uppercase tracking-rite text-ash sm:text-xs"
            >X / Twitter</a
          >
          <!-- TODO: replace with the real Steam store page once it exists -->
          <a
            href="https://store.steampowered.com/"
            target="_blank"
            rel="noopener noreferrer"
            class="social-link font-rite text-[0.65rem] uppercase tracking-rite text-ash sm:text-xs"
            >Steam</a
          >
        </nav>
        <button
          id="drone-toggle"
          type="button"
          aria-pressed="false"
          class="social-link pointer-events-auto font-rite text-[0.65rem] uppercase tracking-rite text-ash sm:text-xs"
        >
          Sound: Off
        </button>
      </footer>
    </main>

    <p
      id="whisper"
      class="pointer-events-none fixed inset-x-0 bottom-24 z-20 text-center font-fraktur text-2xl text-ember opacity-0 transition-opacity duration-1000"
      aria-hidden="true"
    >
      Der Mund &ouml;ffnet sich&hellip;
    </p>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
